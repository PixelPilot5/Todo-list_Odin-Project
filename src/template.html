<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>

<body>
  <header>
    <h1>TODO-LIST</h1>
  </header>
  <div class="content">
    <div class="projects">

      <ul class="project-list"></ul>
      <svg class="add" width="70" height="70" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <circle fill="rgb(183, 5, 183)"cx="12" cy="12" r="10" stroke="#ffffff" stroke-width="1.5"></circle> <path d="M15 12L12 12M12 12L9 12M12 12L12 9M12 12L12 15" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"></path> </g></svg>
    </div>

    <div class="todo-list"></div>
  </div>

  <div class="form-overlay" id="formOverlay">
  <div class="form-popup">
    
    <!-- Header bar -->
    <header class="popup-header">
      <h2>Create a new...</h2>
      <button class="close-btn" aria-label="Close form">&times;</button>
    </header>

    <!-- Main Content Area split into sidebar and form panel -->
    <div class="popup-body">
      
      <!-- Left Sidebar Nav -->
      <nav class="popup-sidebar">
        <ul>
          <li class="active" id="todo-form">To Do</li>
          <li id="project-form">Project</li>
        </ul>
      </nav>

      <!-- Right Form Dynamic Container -->
       <div class="popup-right">
<form class="popup-form">
        <div class="form-group inline-group">
          <label for="todo-title">Title:</label>
          <input type="text" id="todo-title" placeholder="Pay bills" required>
        </div>

        <div class="form-group inline-group">
          <label for="todo-details">Details:</label>
          <input type="text" id="todo-details" placeholder="e.g internet, phone, rent.">
        </div>

        <!-- Sticky Bottom Section for Controls -->
        <div class="form-controls">
          <div class="control-row">
            <label for="due-date">Due Date:</label>
            <input type="date" id="due-date" placeholder="DD-MM-YYYY">
          </div>

          <div class="control-row">
            <span class="label-mock">Priority:</span>
            <div class="priority-group">
              <button type="button" class="priority-btn low">LOW</button>
              <button type="button" class="priority-btn medium">MEDIUM</button>
              <button type="button" class="priority-btn high">HIGH</button>
            </div>
          </div>

          <button type="submit" class="submit-btn">ADD TO DO</button>
        </div>
      </form>
       </div>

    </div>
  </div>
</div>
  <!-- <button id="addtodo">add todo</button> -->
<!-- <div class="todo-list"></div> -->
</body>

</html>
